services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: kalshi
      POSTGRES_PASSWORD: kalshi
      POSTGRES_DB: kalshi_ev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalshi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
